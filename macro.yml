name: Macro Data Scraper

on:
  schedule:
    - cron: '0 * * * *'      # každou hodinu
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'macro_scraper.py'

jobs:
  macro:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install requests

      - name: Run macro scraper
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python macro_scraper.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro.json data/bonds.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "macro: update $(date -u '+%H:%M UTC')"
            git push
          fi
