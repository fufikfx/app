name: News Scraper

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:   # Manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit data/news.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scraper.py

      - name: Commit & push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/news.json; then
            echo "No changes in news.json — skipping commit"
          else
            git add data/news.json
            ARTICLE_COUNT=$(python -c "import json; d=json.load(open('data/news.json')); print(d['meta']['total'])")
            git commit -m "news: ${ARTICLE_COUNT} articles [$(date -u '+%H:%M UTC')]"
            git push
          fi

  # Weekly purge job — runs every Sunday at 00:05 UTC
  # Older articles are already expired by the scraper (TTL_DAYS=7)
  # This job verifies and force-saves a clean news.json
  weekly-purge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run on Sundays at ~midnight UTC (cron doesn't support 'weekly' directly)
    if: github.event_name == 'schedule'

    steps:
      - name: Check if Sunday
        id: check_day
        run: |
          DAY=$(date -u +%u)  # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # Run only on Sunday between 00:00-00:30
          if [ "$DAY" = "7" ] && [ "$HOUR" = "00" ] && [ "$MINUTE" -lt "30" ]; then
            echo "is_sunday=true" >> $GITHUB_OUTPUT
          else
            echo "is_sunday=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repo
        if: steps.check_day.outputs.is_sunday == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.check_day.outputs.is_sunday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        if: steps.check_day.outputs.is_sunday == 'true'
        run: pip install -r requirements.txt

      - name: Force weekly purge (remove articles older than 7 days)
        if: steps.check_day.outputs.is_sunday == 'true'
        run: |
          python3 -c "
          import json, time, pathlib
          f = pathlib.Path('data/news.json')
          if not f.exists():
              print('No news.json yet')
              exit(0)
          d = json.load(open(f))
          cutoff = int(time.time()) - 7 * 86400
          before = sum(len(v) for v in d.get('categories',{}).values())
          for cat in d.get('categories', {}):
              d['categories'][cat] = [a for a in d['categories'][cat] if (a.get('ts') or 0) >= cutoff]
          after = sum(len(v) for v in d.get('categories',{}).values())
          d['meta']['last_purge'] = int(time.time())
          json.dump(d, open(f,'w'), ensure_ascii=False, separators=(',',':'))
          print(f'PURGE: removed {before-after} old articles, {after} remaining')
          "

      - name: Commit purged news.json
        if: steps.check_day.outputs.is_sunday == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/news.json; then
            echo "Nothing to purge"
          else
            git add data/news.json
            git commit -m "chore: weekly purge — articles older than 7 days removed [$(date -u '+%Y-%m-%d')]"
            git push
          fi
